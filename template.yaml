AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Integração de pagamentos Pix via Mercado Pago Orders API - arquitetura
  hexagonal (ports & adapters). Uma única Lambda (PagamentoFunction) com
  dois gatilhos:
    1) SQSTrigger - consome a fila 'sqs-pagamento-solicitar' e cria Orders
       no Mercado Pago. Publica em 'sqs-pagamento-efetuado' (sucesso) ou
       'sqs-pagamento-recusado' (falha no gateway).
    2) WebhookApi - recebe as notificações (webhook) do Mercado Pago para o
       tópico "order", atualiza o status do pedido e, quando confirmado
       como pago, publica novamente em 'sqs-pagamento-efetuado'.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 15
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        ORDERS_TABLE_NAME: !Ref OrdersTable
        SQS_PAGAMENTO_EFETUADO_QUEUE_URL: !Ref EfetuadoPagamentoQueue
        SQS_PAGAMENTO_RECUSADO_QUEUE_URL: !Ref RecusadoPagamentoQueue
        MP_API_BASE_URL: https://api.mercadopago.com

Parameters:
  MercadoPagoAccessToken:
    Type: String
    NoEcho: true
    Description: >
      Access Token (ex.: APP_USR-...) da sua aplicação no Mercado Pago.
      Recomenda-se, em produção, buscar este valor do AWS Secrets Manager
      em vez de passá-lo como parâmetro de deploy em texto plano.

  MercadoPagoWebhookSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Chave secreta do webhook exibida no painel de Webhooks da aplicação
      no Mercado Pago. Usada para validar o header 'x-signature'. Se deixado
      em branco, a validação de assinatura é pulada (não recomendado em
      produção).

Resources:

  # ---------------------------------------------------------------------
  # Fila SQS que dispara o processamento do pagamento + Dead Letter Queue
  # ---------------------------------------------------------------------
  SolicitarPagamentoDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: sqs-pagamento-solicitar-dlq
      MessageRetentionPeriod: 1209600 # 14 dias

  SolicitarPagamentoQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: sqs-pagamento-solicitar
      VisibilityTimeout: 90 # boa prática: >= 6x o timeout da função (15s)
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SolicitarPagamentoDLQ.Arn
        maxReceiveCount: 5

  # ---------------------------------------------------------------------
  # Filas de saída: publicamos aqui o resultado de cada tentativa de
  # pagamento, para o restante do sistema consumir.
  # ---------------------------------------------------------------------
  EfetuadoPagamentoQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: sqs-pagamento-efetuado
      MessageRetentionPeriod: 345600 # 4 dias

  RecusadoPagamentoQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: sqs-pagamento-recusado
      MessageRetentionPeriod: 345600 # 4 dias

  # ---------------------------------------------------------------------
  # Tabela DynamoDB para persistência do estado das orders
  # ---------------------------------------------------------------------
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: order_id
          AttributeType: S
      KeySchema:
        - AttributeName: order_id
          KeyType: HASH

  # ---------------------------------------------------------------------
  # Lambda única do domínio de pagamento: consome a fila de solicitação e
  # recebe o webhook do Mercado Pago (dois Events na mesma função).
  # ---------------------------------------------------------------------
  PagamentoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: oficina-pagamento
      Handler: src.infrastructure.handlers.payment_handler.lambda_handler
      CodeUri: .
      Environment:
        Variables:
          MP_ACCESS_TOKEN: !Ref MercadoPagoAccessToken
          MP_WEBHOOK_SECRET: !Ref MercadoPagoWebhookSecret
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - SQSPollerPolicy:
            QueueName: !GetAtt SolicitarPagamentoQueue.QueueName
        - SQSSendMessagePolicy:
            QueueName: !GetAtt EfetuadoPagamentoQueue.QueueName
        - SQSSendMessagePolicy:
            QueueName: !GetAtt RecusadoPagamentoQueue.QueueName
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt SolicitarPagamentoQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures
        WebhookApi:
          Type: Api
          Properties:
            Path: /api/webhooks/mercadopago
            Method: post

Outputs:
  SolicitarPagamentoQueueUrl:
    Description: URL da fila SQS que dispara o processamento do pagamento.
    Value: !Ref SolicitarPagamentoQueue

  SolicitarPagamentoQueueArn:
    Description: ARN da fila SQS (útil para outros serviços publicarem nela).
    Value: !GetAtt SolicitarPagamentoQueue.Arn

  EfetuadoPagamentoQueueUrl:
    Description: >
      URL da fila SQS onde é publicado o resultado de sucesso (Pix
      solicitado ou pagamento confirmado) de cada tentativa de pagamento.
    Value: !Ref EfetuadoPagamentoQueue

  RecusadoPagamentoQueueUrl:
    Description: >
      URL da fila SQS onde é publicado o resultado de falha (gateway
      recusou/erro) de cada tentativa de pagamento.
    Value: !Ref RecusadoPagamentoQueue

  WebhookEndpoint:
    Description: >
      URL pública gerada automaticamente pelo API Gateway. Para usar
      https://kortextecnologia.com.br/api/webhooks/mercadopago como no seu
      exemplo, configure um Custom Domain Name no API Gateway apontando
      para este endpoint (veja instruções no README.md).
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/api/webhooks/mercadopago"

  OrdersTableName:
    Description: Nome da tabela DynamoDB com o estado das orders.
    Value: !Ref OrdersTable
