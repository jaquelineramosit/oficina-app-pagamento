name: Terraform Apply Pagamento

on:
  push:
    branches: [ "main" ]
    paths:
      - "terraform/**"
      - "src/**"
      - "requirements.txt"
      - ".github/workflows/terraform-apply-pagamento.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-apply-pagamento-${{ github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: terraform

jobs:
  apply:
    name: Apply oficina-pagamento
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets['AWS_ACCESS_KEY_ID'] }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets['AWS_SECRET_ACCESS_KEY'] }}
      AWS_SESSION_TOKEN: ${{ secrets['AWS_SESSION_TOKEN'] }}
      AWS_REGION: ${{ secrets['AWS_REGION'] }}
      TF_STATE_BUCKET: ${{ secrets['TF_STATE_BUCKET'] }}
      MP_ACCESS_TOKEN: ${{ secrets['MP_ACCESS_TOKEN'] }}
      MP_WEBHOOK_SECRET: ${{ secrets['MP_WEBHOOK_SECRET'] }}
      ENVIRONMENT: ${{ vars.ENVIRONMENT || 'dev' }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'oficina' }}
      SOLICITAR_QUEUE_ARN: ${{ secrets['SOLICITAR_QUEUE_ARN'] }}
      EFETUADO_QUEUE_URL: ${{ secrets['EFETUADO_QUEUE_URL'] }}
      RECUSADO_QUEUE_URL: ${{ secrets['RECUSADO_QUEUE_URL'] }}
      SOLICITAR_DLQ_QUEUE_URL: ${{ secrets['SQS_PAGAMENTO_SOLICITAR_DLQ_URL'] }}
      ORDERS_TABLE_NAME: ${{ vars.ORDERS_TABLE_NAME || 'orders' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Validate required secrets and variables
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            AWS_REGION
            TF_STATE_BUCKET
            MP_ACCESS_TOKEN
            SOLICITAR_QUEUE_ARN
            EFETUADO_QUEUE_URL
            RECUSADO_QUEUE_URL
          )

          missing=0
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "${var_name} is required (secret or GitHub Actions variable)."
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          {
            printf 'TF_VAR_aws_region=%s\n' "${AWS_REGION}"
            printf 'TF_VAR_project_name=%s\n' "${PROJECT_NAME}"
            printf 'TF_VAR_environment=%s\n' "${ENVIRONMENT}"
            printf 'TF_VAR_mp_access_token=%s\n' "${MP_ACCESS_TOKEN}"
            printf 'TF_VAR_mp_webhook_secret=%s\n' "${MP_WEBHOOK_SECRET}"
            printf 'TF_VAR_solicitar_queue_arn=%s\n' "${SOLICITAR_QUEUE_ARN}"
            printf 'TF_VAR_efetuado_queue_url=%s\n' "${EFETUADO_QUEUE_URL}"
            printf 'TF_VAR_recusado_queue_url=%s\n' "${RECUSADO_QUEUE_URL}"
            printf 'TF_VAR_solicitar_dlq_queue_url=%s\n' "${SOLICITAR_DLQ_QUEUE_URL:-}"
            printf 'TF_VAR_orders_table_name=%s\n' "${ORDERS_TABLE_NAME}"
          } >> "${GITHUB_ENV}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform state bucket
        shell: bash
        run: |
          set -euo pipefail

          if aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" 2>/dev/null; then
            echo "Terraform state bucket already exists."
          else
            echo "Creating Terraform state bucket."

            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}"
            else
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}" \
                --create-bucket-configuration LocationConstraint="${AWS_REGION}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "${TF_STATE_BUCKET}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${TF_STATE_BUCKET}" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "${TF_STATE_BUCKET}" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Build Lambda package
        shell: bash
        run: |
          set -e

          rm -rf build lambda.zip

          mkdir build

          pip install -r ../requirements.txt -t build --quiet

          cp -R ../src build/

          cd build

          zip -qr ../lambda.zip .


      - name: Terraform init
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="region=${AWS_REGION}" -backend-config="key=oficina-app-pagamento/${ENVIRONMENT}/pagamento/terraform.tfstate" -backend-config="use_lockfile=true"

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Validate Lambda function
        shell: bash
        run: |
          set -euo pipefail

          state="$(aws lambda get-function \
            --function-name oficina-pagamento \
            --region "${AWS_REGION}" \
            --query 'Configuration.State' \
            --output text)"

          echo "Lambda oficina-pagamento state: ${state}"
